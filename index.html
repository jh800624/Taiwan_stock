<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#ffffff">
<title>台股技術分析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap');
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#eeeeec;--bd:rgba(55,53,47,.09);--bd2:rgba(55,53,47,.16);--tx:#37352f;--tx2:#787672;--tx3:#b0aeaa;--bull:#0f7b6c;--bull2:#d4eee9;--bull3:#a8d8d0;--bear:#c4554d;--bear2:#f9e0de;--bear3:#f0b9b5;--warn:#c17d3c;--warn2:#fbecd8;--warn3:#f4d0a8;--acc:#2d7fe6;--acc2:#daeaf8;--acc3:#a8cef0;--pur:#6549ba;--pur2:#e8e3f8;--pur3:#c5b8ef}
@media(prefers-color-scheme:dark){:root{color-scheme:light only}html,body{background:#fff!important;color:#37352f!important}}
*{box-sizing:border-box;margin:0;padding:0}
html{background:#fff;color-scheme:light only}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:#fff!important;color:#37352f;min-height:100vh;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
nav{height:48px;padding:0 18px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
.brand{display:flex;align-items:center;gap:8px}
.brand-icon{width:26px;height:26px;background:#37352f;border-radius:5px;display:grid;place-items:center;font-size:13px;color:#fff;font-weight:700}
.brand-name{font-size:14px;font-weight:500}
.brand-sub{font-size:11px;color:var(--tx3);margin-top:1px}
.nav-r{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx3)}
.tab-bar{display:flex;border-bottom:1px solid var(--bd);background:#fff;position:sticky;top:48px;z-index:20}
.tab-btn{flex:1;height:42px;border:none;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;-webkit-appearance:none}
.tab-btn.on{color:var(--tx);border-bottom-color:#37352f}
.tab-content{display:none}.tab-content.on{display:block}
.wrap{max-width:860px;margin:0 auto;padding:20px 16px 48px}

/* search */
.search-card{background:#fff;border:1px solid var(–bd2);border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.sym-wrap{flex:1;position:relative}
.sym-wrap input{width:100%;height:44px;background:var(–bg2);border:1px solid var(–bd2);border-radius:6px;padding:0 14px 0 36px;font-family:‘IBM Plex Mono’,monospace;font-size:17px;font-weight:500;letter-spacing:.04em;color:var(–tx);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.sym-wrap input:focus{border-color:var(–acc);box-shadow:0 0 0 2px var(–acc2);background:#fff}
.sym-wrap input::placeholder{font-family:‘Noto Sans TC’,sans-serif;font-size:13px;color:var(–tx3);letter-spacing:0}
.sym-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-family:‘IBM Plex Mono’,monospace;font-size:14px;color:var(–tx3);pointer-events:none}
.go-btn{height:44px;padding:0 20px;background:#37352f;color:#fff;border:none;border-radius:6px;font-family:‘Noto Sans TC’,sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;transition:opacity .15s,transform .1s;white-space:nowrap;-webkit-appearance:none}
.go-btn:hover{opacity:.82}.go-btn:active{transform:scale(.97)}.go-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-sm{height:36px;padding:0 14px;background:transparent;border:1px solid var(–bd2);border-radius:6px;font-family:‘Noto Sans TC’,sans-serif;font-size:13px;color:var(–tx2);cursor:pointer;transition:all .15s;-webkit-appearance:none;white-space:nowrap}
.btn-sm:hover{background:var(–bg2);color:var(–tx)}
.btn-danger{border-color:var(–bear3);color:var(–bear)}
.btn-danger:hover{background:var(–bear2)}
.sp{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip-lbl{font-size:11px;color:var(–tx3);line-height:24px;flex-shrink:0}
.chip{height:24px;line-height:22px;padding:0 9px;background:var(–bg2);border:1px solid var(–bd2);border-radius:4px;font-family:‘IBM Plex Mono’,monospace;font-size:11px;color:var(–tx2);cursor:pointer;transition:all .12s}
.chip:hover{background:var(–acc2);border-color:var(–acc3);color:var(–acc)}

/* status */
.status{display:none;padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:14px;line-height:1.6}
.s-load{background:var(–acc2);border:1px solid var(–acc3);color:var(–acc)}
.s-err{background:var(–bear2);border:1px solid var(–bear3);color:var(–bear)}
.s-ok{background:var(–bull2);border:1px solid var(–bull3);color:var(–bull)}

/* hero */
.hero{display:none;background:#fff;border:1px solid var(–bd);border-radius:8px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.h-name{font-size:18px;font-weight:700}.h-meta{font-family:‘IBM Plex Mono’,monospace;font-size:11px;color:var(–tx3);margin-top:3px}
.p-big{font-family:‘IBM Plex Mono’,monospace;font-size:26px;font-weight:600;letter-spacing:-.02em}
.p-delta{font-family:‘IBM Plex Mono’,monospace;font-size:12px;font-weight:500;margin-top:3px;text-align:right}
.cbull{color:var(–bull)}.cbear{color:var(–bear)}
.ohlc-row{display:flex;gap:14px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(–bd)}
.oi .ol{font-size:10px;color:var(–tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.oi .ov{font-family:‘IBM Plex Mono’,monospace;font-size:13px;font-weight:500}
.ma-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.ma-chip{font-family:‘IBM Plex Mono’,monospace;font-size:11px;padding:2px 9px;border-radius:4px;border:1px solid transparent}
.chart-box{display:none;background:#fff;border:1px solid var(–bd);border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chart-tabs{display:flex;gap:6px;margin-bottom:12px}
.ctab{height:26px;padding:0 12px;line-height:24px;background:transparent;border:1px solid var(–bd2);border-radius:4px;font-size:12px;color:var(–tx2);cursor:pointer;font-family:‘Noto Sans TC’,sans-serif;transition:all .15s}
.ctab.on{background:var(–acc2);color:var(–acc);border-color:var(–acc3)}
.ch-wrap{position:relative;height:185px}
.compare{display:none;flex-wrap:wrap;background:var(–pur2);border:1px solid var(–pur3);border-radius:6px;padding:10px 14px;margin-bottom:14px;align-items:center;gap:10px}
.cmp-lbl{font-size:11px;color:var(–pur);font-weight:500}
.cmp-badge{font-size:12px;font-weight:500;padding:2px 10px;border-radius:4px;display:flex;align-items:center;gap:5px}
.cmp-align{background:var(–bull2);color:var(–bull);border:1px solid var(–bull3)}
.cmp-warn{background:var(–warn2);color:var(–warn);border:1px solid var(–warn3)}
.cmp-note{font-size:12px;color:var(–tx2)}
.dual{display:none;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.dual{grid-template-columns:1fr}}
.panel{background:#fff;border:1px solid var(–bd);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(–bd);background:var(–bg2)}
.pp{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 9px;border-radius:4px}
.pp-d{background:var(–acc2);color:var(–acc);border:1px solid var(–acc3)}
.pp-w{background:var(–warn2);color:var(–warn);border:1px solid var(–warn3)}
.ph-sub{font-size:11px;color:var(–tx3)}.pb{padding:13px 15px}
.vd{border-radius:6px;padding:10px 12px;margin-bottom:11px;border:1px solid transparent}
.vd-bull{background:var(–bull2);border-color:var(–bull3)}.vd-bear{background:var(–bear2);border-color:var(–bear3)}.vd-neut{background:var(–warn2);border-color:var(–warn3)}
.vd-main{font-size:14px;font-weight:700}.vd-sub{font-size:11px;color:var(–tx2);margin-top:3px;line-height:1.5}
.sc-wrap{margin-bottom:11px}.sc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sc-lbl{font-size:11px;min-width:30px}.sc-bg{flex:1;height:4px;background:var(–bg3);border-radius:2px;overflow:hidden}
.sc-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.sf-bull{background:var(–bull)}.sf-bear{background:var(–bear)}.sf-warn{background:var(–warn)}
.sc-num{font-family:‘IBM Plex Mono’,monospace;font-size:11px;min-width:16px;text-align:right}
.sigs-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(–tx3);margin-bottom:7px}
.si{display:flex;gap:8px;padding:8px 10px;border-radius:6px;margin-bottom:5px;border:1px solid transparent}
.si-bull{background:var(–bull2);border-color:var(–bull3)}.si-bear{background:var(–bear2);border-color:var(–bear3)}
.si-warn{background:var(–warn2);border-color:var(–warn3)}.si-neut{background:var(–bg2);border-color:var(–bd)}
.si-dot{width:17px;height:17px;border-radius:50%;font-size:10px;font-weight:700;display:grid;place-items:center;flex-shrink:0;margin-top:2px}
.sd-bull{background:var(–bull);color:#fff}.sd-bear{background:var(–bear);color:#fff}.sd-warn{background:var(–warn);color:#fff}.sd-neut{background:var(–tx3);color:#fff}
.si-head{font-size:12px;font-weight:500}.si-body{font-size:11px;color:var(–tx2);margin-top:2px;line-height:1.5}
.sltp{margin-top:11px;padding:10px 12px;background:var(–bg2);border-radius:6px;border:1px solid var(–bd)}
.sltp-h{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(–tx3);margin-bottom:8px}
.sltp-row{display:flex;gap:7px;margin-bottom:7px;align-items:flex-start}
.stag{font-family:‘IBM Plex Mono’,monospace;font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;flex-shrink:0;margin-top:2px;white-space:nowrap}
.st-bull{background:var(–bull2);color:var(–bull);border:1px solid var(–bull3)}.st-bear{background:var(–bear2);color:var(–bear);border:1px solid var(–bear3)}.st-neut{background:var(–bg3);color:var(–tx2);border:1px solid var(–bd)}
.stxt{font-size:12px;color:var(–tx2);line-height:1.5}.sval{font-family:‘IBM Plex Mono’,monospace;font-size:12px;font-weight:500;color:var(–tx)}

/* batch */
.batch-card{background:#fff;border:1px solid var(–bd2);border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.batch-card textarea{width:100%;min-height:80px;background:var(–bg2);border:1px solid var(–bd2);border-radius:6px;padding:10px 12px;font-family:‘IBM Plex Mono’,monospace;font-size:14px;color:var(–tx);outline:none;resize:vertical;transition:border-color .15s;line-height:1.7;-webkit-appearance:none}
.batch-card textarea:focus{border-color:var(–acc);background:#fff}
.batch-card textarea::placeholder{font-family:‘Noto Sans TC’,sans-serif;font-size:12px;color:var(–tx3)}
.row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}

/* progress */
.prog-wrap{display:none;margin-bottom:14px;background:#fff;border:1px solid var(–bd);border-radius:8px;padding:14px 16px}
.prog-label{font-size:12px;color:var(–tx2);margin-bottom:8px}
.prog-bg{height:6px;background:var(–bg3);border-radius:3px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;background:var(–acc);border-radius:3px;transition:width .3s ease;width:0%}
.prog-detail{font-size:11px;color:var(–tx3)}

/* scanner filter bar */
.scanner-info{background:var(–bg2);border:1px solid var(–bd);border-radius:8px;padding:14px 16px;margin-bottom:14px}
.scanner-info-title{font-size:12px;font-weight:500;margin-bottom:8px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-item{display:flex;flex-direction:column;gap:4px}
.filter-item label{font-size:11px;color:var(–tx3);font-weight:500}
.filter-item select,.filter-item input[type=number]{height:34px;background:var(–bg2);border:1px solid var(–bd2);border-radius:5px;padding:0 10px;font-family:‘Noto Sans TC’,sans-serif;font-size:13px;color:var(–tx);outline:none;-webkit-appearance:none}
.filter-item select:focus,.filter-item input[type=number]:focus{border-color:var(–acc)}

/* direction tabs */
.dir-tabs{display:flex;gap:6px;margin-bottom:14px}
.dir-tab{flex:1;height:38px;border:1px solid var(–bd2);border-radius:6px;background:transparent;font-family:‘Noto Sans TC’,sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;-webkit-appearance:none;color:var(–tx2)}
.dir-tab.on-bull{background:var(–bull2);border-color:var(–bull3);color:var(–bull)}
.dir-tab.on-bear{background:var(–bear2);border-color:var(–bear3);color:var(–bear)}

/* stock cards */
.stock-card{background:#fff;border:1px solid var(–bd);border-radius:8px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.05);cursor:pointer;transition:box-shadow .15s,border-color .15s}
.stock-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);border-color:var(–bd2)}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.sc-code{font-family:‘IBM Plex Mono’,monospace;font-size:15px;font-weight:500}
.sc-name{font-size:11px;color:var(–tx3);margin-top:2px}
.sc-price{font-family:‘IBM Plex Mono’,monospace;font-size:16px;font-weight:600;text-align:right}
.sc-delta{font-family:‘IBM Plex Mono’,monospace;font-size:11px;margin-top:2px;text-align:right}

.score-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.score-num-big{font-family:‘IBM Plex Mono’,monospace;font-size:20px;font-weight:600;min-width:32px}
.score-bg-big{flex:1;height:6px;background:var(–bg3);border-radius:3px;overflow:hidden}
.score-fill-big{height:100%;border-radius:3px}
.score-label{font-size:11px;color:var(–tx3);min-width:50px}

.action-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:8px}
.ab-buy{background:var(–bull2);color:var(–bull);border:1px solid var(–bull3)}
.ab-sell{background:var(–bear2);color:var(–bear);border:1px solid var(–bear3)}
.ab-stop{background:#f9e0de;color:#9b1c1c;border:1px solid #f0b9b5}
.ab-hold{background:var(–bg2);color:var(–tx2);border:1px solid var(–bd2)}
.ab-watch{background:var(–warn2);color:var(–warn);border:1px solid var(–warn3)}

.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid transparent}
.tag-bull{background:var(–bull2);color:var(–bull);border-color:var(–bull3)}
.tag-bear{background:var(–bear2);color:var(–bear);border-color:var(–bear3)}
.tag-warn{background:var(–warn2);color:var(–warn);border-color:var(–warn3)}
.tag-neut{background:var(–bg2);color:var(–tx2);border-color:var(–bd)}

.sc-footer{font-size:11px;color:var(–tx3);margin-top:8px}

.results-summary{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.summary-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500}
.summary-bull{background:var(–bull2);color:var(–bull);border:1px solid var(–bull3)}
.summary-bear{background:var(–bear2);color:var(–bear);border:1px solid var(–bear3)}
.summary-total{background:var(–bg2);color:var(–tx2);border:1px solid var(–bd)}

.phase-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-bottom:10px}
.phase1{background:var(–acc2);color:var(–acc);border:1px solid var(–acc3)}
.phase2{background:var(–pur2);color:var(–pur);border:1px solid var(–pur3)}

footer{text-align:center;padding:16px 16px 28px;font-size:11px;color:var(–tx3);line-height:1.8;border-top:1px solid var(–bd);max-width:860px;margin:0 auto}
.empty{text-align:center;padding:40px 20px;color:var(–tx3);font-size:13px}
</style>

</head>
<body style="background:#fff!important">

<nav>
  <div class="brand">
    <div class="brand-icon">K</div>
    <div><div class="brand-name">台股技術分析</div><div class="brand-sub">策略訊號 · 選股引擎</div></div>
  </div>
  <div class="nav-r" id="clock"></div>
</nav>

<div class="tab-bar">
  <button class="tab-btn on" onclick="switchTab('single',this)">單檔分析</button>
  <button class="tab-btn" onclick="switchTab('portfolio',this)">持股健診</button>
  <button class="tab-btn" onclick="switchTab('scanner',this)">全市場掃描</button>
</div>

<!-- ══ TAB 1 ══ -->

<div class="tab-content on" id="tab-single">
<div class="wrap">
  <div class="search-card">
    <div class="search-row">
      <div class="sym-wrap"><span class="sym-icon">#</span>
        <input id="sym" type="text" inputmode="numeric" placeholder="輸入股票代號（例：2330、AAPL）"/>
      </div>
      <button class="go-btn" id="goBtn" onclick="runSingle()"><div class="sp" id="sp"></div><span id="btnTxt">分析</span></button>
    </div>
    <div class="chips">
      <span class="chip-lbl">常用：</span>
      <div class="chip" onclick="fillS('2330')">2330 台積電</div>
      <div class="chip" onclick="fillS('2317')">2317 鴻海</div>
      <div class="chip" onclick="fillS('2454')">2454 聯發科</div>
      <div class="chip" onclick="fillS('0050')">0050 元大50</div>
      <div class="chip" onclick="fillS('2382')">2382 廣達</div>
      <div class="chip" onclick="fillS('2881')">2881 富邦金</div>
    </div>
  </div>
  <div class="status" id="s1"></div>
  <div class="hero" id="hero">
    <div class="hero-top">
      <div><div class="h-name" id="hName">—</div><div class="h-meta" id="hMeta">—</div></div>
      <div><div class="p-big" id="hPrice">—</div><div class="p-delta" id="hDelta">—</div></div>
    </div>
    <div class="ohlc-row" id="hOHLC"></div>
    <div class="ma-row" id="hMA"></div>
  </div>
  <div class="chart-box" id="chartBox">
    <div class="chart-tabs">
      <button class="ctab on" onclick="switchChart('daily',this)">日K（近40根）</button>
      <button class="ctab" onclick="switchChart('weekly',this)">週K（近52根）</button>
    </div>
    <div class="ch-wrap"><canvas id="mainChart"></canvas></div>
  </div>
  <div class="compare" id="compare">
    <span class="cmp-lbl">多週期一致性</span>
    <span class="cmp-badge" id="cmpBadge">—</span>
    <span class="cmp-note" id="cmpNote">—</span>
  </div>
  <div class="dual" id="dual">
    <div class="panel"><div class="ph"><span class="pp pp-d">日K</span><span class="ph-sub">最新一根日K分析</span></div><div class="pb" id="pbD"></div></div>
    <div class="panel"><div class="ph"><span class="pp pp-w">週K</span><span class="ph-sub">最新一根週K分析</span></div><div class="pb" id="pbW"></div></div>
  </div>
</div>
</div>

<!-- ══ TAB 2 ══ -->

<div class="tab-content" id="tab-portfolio">
<div class="wrap">
  <div class="batch-card">
    <textarea id="portfolioInput" placeholder="輸入持股代號，每行一個或逗號分隔：
2330
2317, 2454
0050"></textarea>
    <div class="row">
      <button class="go-btn" id="pBtn" onclick="runPortfolio()"><div class="sp" id="pSp"></div><span id="pTxt">開始健診</span></button>
      <button class="btn-sm btn-danger" onclick="stopAll()">停止</button>
    </div>
  </div>
  <div class="prog-wrap" id="pProg">
    <div class="prog-label" id="pProgLabel">準備中…</div>
    <div class="prog-bg"><div class="prog-fill" id="pBar"></div></div>
    <div class="prog-detail" id="pDetail"></div>
  </div>
  <div class="status" id="s2"></div>
  <div id="portfolioResults"></div>

<script>

function switchTab(id,el){

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));

// ── 停止旗標 ──
let stopped=false;
function stopAll(){stopped=true;}

// ── Yahoo Finance API ──
const PROXIES=[
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
];
async function yahooFetch(sym,interval,range){
  const target=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=${interval}&range=${range}&includePrePost=false`;
  let lastErr;
  for(const mkP of PROXIES){
    try{
      const res=await fetch(mkP(target),{signal:AbortSignal.timeout(12000)});
      if(!res.ok)throw new Error('HTTP '+res.status);
      const txt=await res.text();
      if(!txt||!txt.trim())throw new Error('empty');
      const j=JSON.parse(txt);
      const r=j?.chart?.result?.[0];
      if(!r)throw new Error('no result');
      return r;
    }catch(e){lastErr=e;}
  }
  throw new Error(lastErr?.message||'failed');
}
function parseYahoo(r){
  const ts=r.timestamp||[],q=r.indicators?.quote?.[0]||{},cs=[];
  ts.forEach((t,i)=>{
    if(q.close[i]==null)return;
    const d=new Date(t*1000);
    cs.push({
      date:`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`,
      open:Math.round((q.open[i]||q.close[i])*100)/100,
      high:Math.round((q.high[i]||q.close[i])*100)/100,
      low:Math.round((q.low[i]||q.close[i])*100)/100,
      close:Math.round(q.close[i]*100)/100,
      volume:q.volume?.[i]||0,
    });
  });
  const meta=r.meta||{};
  return{candles:cs,name:meta.longName||meta.shortName||meta.symbol||''};
}
function buildWeekly(d){
  const w={};
  d.forEach(c=>{
    const p=c.date.split('/'),dt=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    const diff=dt.getDay()===0?-6:1-dt.getDay(),mon=new Date(dt);mon.setDate(dt.getDate()+diff);
    const key=mon.toISOString().slice(0,10);
    if(!w[key]){w[key]={date:c.date,open:c.open,high:c.high,low:c.low,close:c.close};}
    else{if(c.high>w[key].high)w[key].high=c.high;if(c.low<w[key].low)w[key].low=c.low;w[key].close=c.close;}
  });
  return Object.values(w);
}
function normalize(s){s=s.trim().toUpperCase();if(/^\d{4,5}$/.test(s))s+='.TW';return s;}
function parseSymbols(txt){return txt.split(/[\n,\s]+/).map(s=>s.trim()).filter(s=>s).map(normalize);}

// ── TWSE JSONP (全市場第一階段) ──
function jsonpFetch(url,cbParam){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*9999);
    const to=setTimeout(()=>{delete window[cb];sc.remove();reject(new Error('timeout'));},15000);
    window[cb]=data=>{clearTimeout(to);delete window[cb];sc.remove();resolve(data);};
    const sc=document.createElement('script');
    sc.src=url+(url.includes('?')?'&':'?')+cbParam+'='+cb;
    sc.onerror=()=>{clearTimeout(to);delete window[cb];sc.remove();reject(new Error('script error'));};
    document.head.appendChild(sc);
  });
}

// 抓 TWSE 當日所有上市股票行情（MI_INDEX）
// 欄位: [證券代號, 證券名稱, 成交股數, 成交筆數, 成交金額, 開盤價, 最高價, 最低價, 收盤價, 漲跌(+/-), 漲跌價差, 最後揭示買價, 最後揭示買量, 最後揭示賣價, 最後揭示賣量, 本益比]
async function fetchTWSEAllStocks(){
  // 先取今天的日期格式 YYYYMMDD
  const now=new Date();
  // 如果是假日/盤前就取最近的收盤日（退到昨天）
  const dates=[];
  for(let i=0;i<5;i++){
    const d=new Date(now);d.setDate(now.getDate()-i);
    if(d.getDay()!==0&&d.getDay()!==6){
      dates.push(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`);
    }
    if(dates.length>=3)break;
  }
  let lastErr;
  for(const date of dates){
    try{
      const url=`https://www.twse.com.tw/exchangeReport/MI_INDEX?response=json&date=${date}&type=ALLBUT0999`;
      const data=await jsonpFetch(url,'callback');
      if(data.stat==='OK'&&data.data9?.length>0){
        // data9 = 各類股票, fields9 = 欄位名稱
        return{date,rows:data.data9,fields:data.fields9||[]};
      }
    }catch(e){lastErr=e;}
  }
  throw new Error('無法取得全市場資料：'+(lastErr?.message||''));
}

// ── MA & Analyze ──
function calcMAs(arr){
  const ma=n=>{if(arr.length<n)return null;return Math.round(arr.slice(-n).reduce((a,b)=>a+b,0)/n*100)/100;};
  return{ma5:ma(5),ma10:ma(10),ma20:ma(20),ma60:ma(60)};
}
function analyze(candles){
  if(!candles||candles.length<2)return null;
  const cur=candles[candles.length-1],prv=candles[candles.length-2];
  const{open:o,high:h,low:l,close:c}=cur,{open:po,high:ph,low:pl,close:pc}=prv;
  const body=Math.abs(c-o),total=h-l;
  const amp=total>0?(total/Math.max(o,c))*100:0,bRatio=total>0?body/total:0;
  const isRed=c>o,isBlack=c<o;
  const isLR=isRed&&amp>=6&&bRatio>=0.8,isLB=isBlack&&amp>=6&&bRatio>=0.8;
  const uSh=isRed?(h-c):(h-o),longUp=total>0&&uSh>body*2.5;
  const pBody=Math.abs(pc-po),pTotal=ph-pl;
  const pAmp=pTotal>0?(pTotal/Math.max(po,pc))*100:0,pBR=pTotal>0?pBody/pTotal:0;
  const pLR=pc>po&&pAmp>=6&&pBR>=0.8,pLB=pc<po&&pAmp>=6&&pBR>=0.8;
  const closes=candles.map(x=>x.close),{ma5,ma20,ma60}=calcMAs(closes);
  const maLong=ma5&&ma20&&ma60&&ma5>ma20&&ma20>ma60,maShort=ma5&&ma20&&ma60&&ma5<ma20&&ma20<ma60,maTangle=ma5&&ma20&&ma60&&!maLong&&!maShort;
  let sigs=[],bull=0,bear=0,warn=0;
  if(isLR){sigs.push({t:'bull',h:'長紅棒',b:`振幅 ${amp.toFixed(1)}%，實體 ${(bRatio*100).toFixed(0)}%。低點 ${l} 為多空分水嶺。`});bull+=2;}
  else if(isLB){sigs.push({t:'bear',h:'長黑棒',b:`振幅 ${amp.toFixed(1)}%，實體 ${(bRatio*100).toFixed(0)}%。高點 ${h} 為多空分水嶺。`});bear+=2;}
  else if(isRed){sigs.push({t:'neut',h:'中紅棒',b:`振幅 ${amp.toFixed(1)}%，搭配前K與均線判斷。`});}
  else if(isBlack){sigs.push({t:'neut',h:'中黑棒',b:`振幅 ${amp.toFixed(1)}%，搭配前K與均線判斷。`});}
  if(longUp){sigs.push({t:'warn',h:'長上引線',b:'多方衝高失敗，等後續K棒確認。'});warn+=1;}
  if(pLR&&c<pl){sigs.push({t:'bear',h:'跌破前長紅低點',b:`${c} 跌破 ${pl}，空單訊號。`});bear+=3;}
  else if(pLR){sigs.push({t:'bull',h:'守住前長紅低點',b:`在 ${pl} 之上，支撐有效。`});bull+=1;}
  if(pLB&&c>ph){sigs.push({t:'bull',h:'漲破前長黑高點',b:`${c} 突破 ${ph}，多單訊號。`});bull+=3;}
  else if(pLB){sigs.push({t:'bear',h:'在前長黑高點以下',b:`在 ${ph} 之下，壓力仍在。`});bear+=1;}
  if(maLong){sigs.push({t:'bull',h:'均線多頭排列',b:`MA5(${ma5})>MA20(${ma20})>MA60(${ma60})。`});bull+=2;}
  else if(maShort){sigs.push({t:'bear',h:'均線空頭排列',b:`MA5(${ma5})<MA20(${ma20})<MA60(${ma60})。`});bear+=2;}
  else if(maTangle){sigs.push({t:'warn',h:'均線糾結',b:'等方向確立後再進場。'});warn+=2;}
  if(ma60!=null&&c>ma60){sigs.push({t:'bull',h:'站上 MA60',b:`多空分界偏多，不做空。`});bull+=1;}
  else if(ma60!=null){sigs.push({t:'bear',h:'在 MA60 以下',b:`多空分界偏空，不做多。`});bear+=1;}
  if(ma5!=null&&c>ma5&&maLong){sigs.push({t:'bull',h:'站上 MA5（多頭中）',b:'強勢特徵。'});bull+=1;}
  let vMain,vSub,vCls;
  if(warn>=3||maTangle){vMain='暫時觀望';vSub='等方向確立。';vCls='vd-neut';}
  else if(bull>bear&&bull>=3){vMain='偏多訊號';vSub=`多方得分 ${bull}。`;vCls='vd-bull';}
  else if(bear>bull&&bear>=3){vMain='偏空訊號';vSub=`空方得分 ${bear}。`;vCls='vd-bear';}
  else{vMain='訊號不明確';vSub='觀望。';vCls='vd-neut';}
  let sltp=[];
  if(isLR){sltp.push({cls:'st-bull',tag:'多單停損',txt:`跌破長紅低點 <span class="sval">${l}</span>`});sltp.push({cls:'st-bull',tag:'移動停利',txt:'跌破前一日低點出場'});if(ma5!=null)sltp.push({cls:'st-bull',tag:'加碼點',txt:`拉回 MA5(<span class="sval">${ma5}</span>) 守住可加碼`});}
  if(isLB){sltp.push({cls:'st-bear',tag:'空單停損',txt:`漲破長黑高點 <span class="sval">${h}</span>`});sltp.push({cls:'st-bear',tag:'移動停利',txt:'站回前一日高點出場'});if(ma5!=null)sltp.push({cls:'st-bear',tag:'加碼點',txt:`反彈 MA5(<span class="sval">${ma5}</span>) 壓回可加碼`});}
  if(ma20!=null)sltp.push({cls:bull>bear?'st-bull':'st-bear',tag:'均線停損',txt:`MA20(<span class="sval">${ma20}</span>) 跌破未站回視為趨勢改變`});
  if(!isLR&&!isLB)sltp.push({cls:'st-neut',tag:'建議',txt:'觀望等關鍵K棒確立後再設停損點'});
  return{sigs,bull,bear,warn,vMain,vSub,vCls,sltp,cur:{o,h,l,c,isLR,isLB},mas:{ma5,ma20,ma60}};
}

// 選股評分（對應課程條件）
function scoreStock(dr,wr,dailyVol){
  let bull=0,bear=0,reasons=[];
  if(!dr||!wr)return{bull:0,bear:0,reasons:[]};
  const{mas,cur}=dr;
  // MA60 多空分界
  if(mas.ma60&&cur.c>mas.ma60){bull+=2;reasons.push({t:'bull',s:'站上 MA60'});}
  else if(mas.ma60&&cur.c<=mas.ma60){bear+=2;reasons.push({t:'bear',s:'在 MA60 以下'});}
  // 日K 均線排列
  if(mas.ma5&&mas.ma20&&mas.ma60&&mas.ma5>mas.ma20&&mas.ma20>mas.ma60){bull+=2;reasons.push({t:'bull',s:'日K多頭排列'});}
  else if(mas.ma5&&mas.ma20&&mas.ma60&&mas.ma5<mas.ma20&&mas.ma20<mas.ma60){bear+=2;reasons.push({t:'bear',s:'日K空頭排列'});}
  // 週K 排列
  if(wr){const{mas:wm}=wr;if(wm.ma5&&wm.ma20&&wm.ma5>wm.ma20){bull+=2;reasons.push({t:'bull',s:'週K偏多'});}else if(wm.ma5&&wm.ma20&&wm.ma5<wm.ma20){bear+=2;reasons.push({t:'bear',s:'週K偏空'});}}
  // 雙週期同步
  const dDir=dr.bull>dr.bear&&dr.bull>=3?'bull':dr.bear>dr.bull&&dr.bear>=3?'bear':'neut';
  const wDir=wr&&wr.bull>wr.bear&&wr.bull>=3?'bull':wr&&wr.bear>wr.bull&&wr.bear>=3?'bear':'neut';
  if(dDir==='bull'&&wDir==='bull'){bull+=3;reasons.push({t:'bull',s:'雙週期同步偏多'});}
  if(dDir==='bear'&&wDir==='bear'){bear+=3;reasons.push({t:'bear',s:'雙週期同步偏空'});}
  // K棒型態
  if(cur.isLR){bull+=2;reasons.push({t:'bull',s:'長紅棒'});}
  if(cur.isLB){bear+=2;reasons.push({t:'bear',s:'長黑棒'});}
  // 成交量 >3000張
  if(dailyVol>=3000){bull+=1;bear+=1;reasons.push({t:'neut',s:`量 ${(dailyVol/1000).toFixed(1)}K張`});}
  return{bull,bear,reasons};
}

function getAction(dr,wr){
  if(!dr||!wr)return{action:'無法分析',cls:'ab-hold',detail:''};
  const dDir=dr.bull>dr.bear&&dr.bull>=3?'bull':dr.bear>dr.bull&&dr.bear>=3?'bear':'neut';
  const wDir=wr.bull>wr.bear&&wr.bull>=3?'bull':wr.bear>wr.bull&&wr.bear>=3?'bear':'neut';
  const{cur,mas}=dr;
  if(dDir==='bull'&&wDir==='bull'){
    let d=`雙週期同步偏多`;if(mas.ma20)d+=`，停損參考 MA20(${mas.ma20})`;if(cur.isLR)d+=`，長紅低點 ${cur.l} 最強支撐`;
    return{action:'✓ 考慮買進',cls:'ab-buy',detail:d};
  }
  if(dDir==='bear'&&wDir==='bear'){
    let d=`雙週期同步偏空`;if(mas.ma20)d+=`，反彈到 MA20(${mas.ma20}) 附近可空`;
    return{action:'↓ 考慮放空',cls:'ab-sell',detail:d};
  }
  if(dDir!==wDir&&dDir!=='neut'&&wDir!=='neut')return{action:'⟳ 觀望',cls:'ab-watch',detail:`日K偏${dDir==='bull'?'多':'空'}但週K偏${wDir==='bull'?'多':'空'}，方向衝突`};
  if(dr.warn>=3)return{action:'— 均線糾結',cls:'ab-hold',detail:'等方向確立再進場'};
  return{action:'— 持有觀察',cls:'ab-hold',detail:'訊號不明確'};
}

async function runSingle(){

    const[dR,wR]=await Promise.all([yahooFetch(raw,'1d','6mo'),yahooFetch(raw,'1wk','2y')]);
    const{candles:dC,name}=parseYahoo(dR);const{candles:wC}=parseYahoo(wR);
    if(dC.length<2)throw new Error('資料不足');

}

function renderHero(daily,code,name){
  const last=daily[daily.length-1],prev=daily[daily.length-2];
  const delta=last.close-prev.close,pct=(delta/prev.close)*100;
  const mas=calcMAs(daily.map(x=>x.close));
  document.getElementById('hName').textContent=name?`${name} (${code})`:code;
  document.getElementById('hMeta').textContent=`Yahoo Finance · ${last.date}`;
  document.getElementById('hPrice').textContent=last.close.toFixed(2);
  document.getElementById('hPrice').className='p-big '+(delta>=0?'cbull':'cbear');
  document.getElementById('hDelta').innerHTML=`${delta>=0?'▲':'▼'} ${Math.abs(delta).toFixed(2)} (${delta>=0?'+':''}${pct.toFixed(2)}%)`;
  document.getElementById('hDelta').className='p-delta '+(delta>=0?'cbull':'cbear');
  document.getElementById('hOHLC').innerHTML=[{l:'開盤',v:last.open.toFixed(2)},{l:'最高',v:last.high.toFixed(2),c:'cbull'},{l:'最低',v:last.low.toFixed(2),c:'cbear'},{l:'收盤',v:last.close.toFixed(2)},{l:'日期',v:last.date}].map(x=>`<div class="oi"><div class="ol">${x.l}</div><div class="ov ${x.c||''}">${x.v}</div></div>`).join('');
  document.getElementById('hMA').innerHTML=[{n:'MA5',v:mas.ma5},{n:'MA20',v:mas.ma20},{n:'MA60',v:mas.ma60}].filter(m=>m.v!=null).map(m=>{const up=last.close>=m.v;return`<div class="ma-chip" style="color:${up?'var(--bull)':'var(--bear)'};border-color:${up?'var(--bull3)':'var(--bear3)'};background:${up?'var(--bull2)':'var(--bear2)'}">${m.n} ${m.v.toFixed(2)} ${up?'▲':'▼'}</div>`;}).join('');
}
function switchChart(mode,el){cMode=mode;document.querySelectorAll('.ctab').forEach(b=>b.classList.remove('on'));el.classList.add('on');drawChart(mode);}
function drawChart(mode){
  const data=mode==='daily'?gD:gW;if(!data?.length)return;
  const n=Math.min(mode==='daily'?40:52,data.length),slice=data.slice(-n);
  const labels=slice.map(x=>x.date.slice(5)),closes=slice.map(x=>x.close);
  const up=closes[closes.length-1]>=closes[0];
  if(chartInst){chartInst.destroy();chartInst=null;}
  const ctx=document.getElementById('mainChart').getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,185);g.addColorStop(0,up?'rgba(15,123,108,.1)':'rgba(196,85,77,.1)');g.addColorStop(1,'rgba(255,255,255,0)');
  chartInst=new Chart(ctx,{type:'line',data:{labels,datasets:[{data:closes,borderColor:up?'#0f7b6c':'#c4554d',backgroundColor:g,borderWidth:1.5,pointRadius:0,fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.parsed.y.toFixed(2)}}},scales:{x:{ticks:{color:'#b0aeaa',font:{size:10,family:'IBM Plex Mono'},maxTicksLimit:10},grid:{color:'rgba(55,53,47,.05)'},border:{color:'rgba(55,53,47,.09)'}},y:{ticks:{color:'#b0aeaa',font:{size:10,family:'IBM Plex Mono'}},grid:{color:'rgba(55,53,47,.05)'},border:{color:'rgba(55,53,47,.09)'}}}}});
}
function renderPanel(id,r){
  if(!r)return;
  const maxS=Math.max(r.bull,r.bear,1)*2;
  const bW=Math.min(100,(r.bull/maxS)*100).toFixed(0),brW=Math.min(100,(r.bear/maxS)*100).toFixed(0),wW=Math.min(100,(r.warn/6)*100).toFixed(0);
  const sigHTML=r.sigs.map(s=>`<div class="si si-${s.t}"><div class="si-dot sd-${s.t}">${s.t==='bull'?'+':s.t==='bear'?'−':s.t==='warn'?'!':'·'}</div><div><div class="si-head">${s.h}</div><div class="si-body">${s.b}</div></div></div>`).join('');
  const stHTML=r.sltp.map(s=>`<div class="sltp-row"><span class="stag ${s.cls}">${s.tag}</span><span class="stxt">${s.txt}</span></div>`).join('');
  document.getElementById(id).innerHTML=`<div class="vd ${r.vCls}"><div class="vd-main">${r.vMain}</div><div class="vd-sub">${r.vSub}</div></div><div class="sc-wrap"><div class="sc-row"><span class="sc-lbl cbull">多方</span><div class="sc-bg"><div class="sc-fill sf-bull" style="width:${bW}%"></div></div><span class="sc-num cbull">${r.bull}</span></div><div class="sc-row"><span class="sc-lbl cbear">空方</span><div class="sc-bg"><div class="sc-fill sf-bear" style="width:${brW}%"></div></div><span class="sc-num cbear">${r.bear}</span></div><div class="sc-row"><span class="sc-lbl" style="color:var(--warn)">警示</span><div class="sc-bg"><div class="sc-fill sf-warn" style="width:${wW}%"></div></div><span class="sc-num" style="color:var(--warn)">${r.warn}</span></div></div><div class="sigs-title">符合的策略規則</div>${sigHTML}<div class="sltp"><div class="sltp-h">停損/停利建議</div>${stHTML}</div>`;
}
function renderCompare(d,w){
  const dir=r=>r.bull>r.bear&&r.bull>=3?'bull':r.bear>r.bull&&r.bear>=3?'bear':'neut';
  const dD=dir(d),wD=dir(w);
  const badge=document.getElementById('cmpBadge'),note=document.getElementById('cmpNote');
  if(dD==='neut'||wD==='neut'){badge.className='cmp-badge cmp-warn';badge.textContent='訊號強度不足';note.textContent='日K或週K訊號尚不明確，建議觀望。';}
  else if(dD===wD){badge.className='cmp-badge cmp-align';badge.textContent='✓ 雙週期同步'+(dD==='bull'?'偏多':'偏空');note.textContent=dD==='bull'?'日K與週K同步確認多頭，勝率較高。':'日K與週K同步確認空頭，勝率較高。';}
  else{badge.className='cmp-badge cmp-warn';badge.textContent='⚠ 日K與週K方向衝突';note.textContent='以週K方向為主，謹慎操作。';}
}

// ══════════════════════════════════
//  TAB 2: 持股健診
// ══════════════════════════════════
async function runPortfolio(){
  const syms=parseSymbols(document.getElementById('portfolioInput').value);
  if(!syms.length){showS('s2','請輸入股票代號','s-err');return;}
  stopped=false;
  const btn=document.getElementById('pBtn');
  btn.disabled=true;document.getElementById('pSp').style.display='block';document.getElementById('pTxt').textContent='分析中';
  document.getElementById('pProg').style.display='block';
  hideS('s2');document.getElementById('portfolioResults').innerHTML='';
  const results=[];
  for(let i=0;i<syms.length;i++){
    if(stopped)break;
    const sym=syms[i];
    document.getElementById('pBar').style.width=Math.round(i/syms.length*100)+'%';
    document.getElementById('pProgLabel').textContent=`分析 ${sym}… (${i+1}/${syms.length})`;
    try{
      const[dR,wR]=await Promise.all([yahooFetch(sym,'1d','6mo'),yahooFetch(sym,'1wk','2y')]);
      const{candles:dC,name}=parseYahoo(dR);const{candles:wC}=parseYahoo(wR);
      if(dC.length>=2){
        const daily=dC,weekly=wC.length>=2?wC:buildWeekly(dC);
        const dr=analyze(daily),wr=analyze(weekly);
        const vol=daily.slice(-5).reduce((a,c)=>a+c.volume,0)/5/1000;// 平均張數
        const score=scoreStock(dr,wr,vol*1000);
        const action=getAction(dr,wr);
        const last=daily[daily.length-1],prev=daily[daily.length-2];
        results.push({sym,name,last,delta:last.close-prev.close,pct:(last.close-prev.close)/prev.close*100,dr,wr,score,action,vol});
      }
    }catch(e){results.push({sym,name:'',error:e.message});}
    await new Promise(r=>setTimeout(r,400));
  }
  document.getElementById('pBar').style.width='100%';
  document.getElementById('pProgLabel').textContent=`完成 ${results.filter(r=>!r.error).length} 檔`;
  setTimeout(()=>{document.getElementById('pProg').style.display='none';},2000);
  btn.disabled=false;document.getElementById('pSp').style.display='none';document.getElementById('pTxt').textContent='開始健診';

  // 排序：停損 > 買進 > 放空 > 觀望 > 持有
  const order={'⚠ 停損出場':0,'✓ 考慮買進':1,'↓ 考慮放空':2,'⟳ 觀望':3,'— 均線糾結':4,'— 持有觀察':5,'無法分析':9};
  results.sort((a,b)=>(order[a.action?.action]??9)-(order[b.action?.action]??9));
  document.getElementById('portfolioResults').innerHTML=results.map(r=>renderStockCard(r,true)).join('');
}

// ══════════════════════════════════
//  TAB 3: 全市場掃描
// ══════════════════════════════════
let scanBullList=[],scanBearList=[];

async function runScanner(){
  stopped=false;
  const btn=document.getElementById('sBtn');
  btn.disabled=true;document.getElementById('sSp').style.display='block';document.getElementById('sTxt').textContent='掃描中';
  document.getElementById('sProg').style.display='block';
  document.getElementById('scanResultsWrap').style.display='none';
  hideS('s3');
  scanBullList=[];scanBearList=[];

  const dir=document.getElementById('scanDir').value;
  const minVol=parseInt(document.getElementById('minVol').value)||0;
  const minPrice=parseFloat(document.getElementById('minPrice').value)||0;
  const maxPrice=parseFloat(document.getElementById('maxPrice').value)||99999;
  const changeFilter=document.getElementById('changeFilter').value;
  const maxAnalyze=parseInt(document.getElementById('maxAnalyze').value)||50;

  // ── Phase 1: TWSE 全市場快篩 ──
  document.getElementById('sProgLabel').textContent='Phase 1：從 TWSE 取得全市場收盤資料…';
  document.getElementById('sBar').style.width='5%';
  let candidates=[];
  try{
    const{rows}=await fetchTWSEAllStocks();
    // rows 欄位: [代號, 名稱, 成交股數, 成交筆數, 成交金額, 開盤, 最高, 最低, 收盤, 漲跌符號, 漲跌價差, ...]
    const pn=s=>parseFloat((s||'').replace(/,/g,'').replace(/--/g,'0'))||0;
    candidates=rows.map(r=>({
      code:r[0].trim(),name:r[1].trim(),
      vol:pn(r[2])/1000,// 換算成張（股/1000）
      open:pn(r[5]),high:pn(r[6]),low:pn(r[7]),close:pn(r[8]),
      changeSign:r[9],changeAmt:pn(r[10]),
    })).filter(c=>{
      if(!c.code||!/^\d{4,5}$/.test(c.code))return false;
      if(c.close<minPrice||c.close>maxPrice)return false;
      if(c.vol<minVol/1000)return false;// vol 已是張
      const pct=c.close>0?c.changeAmt/c.close*100:0;
      if(changeFilter==='up'&&c.changeSign!=='+')return false;
      if(changeFilter==='down'&&c.changeSign!=='-')return false;
      if(changeFilter==='strong'&&(c.changeSign!=='+'||pct<2))return false;
      if(changeFilter==='weak'&&(c.changeSign!=='-'||pct<2))return false;
      return true;
    });
    document.getElementById('sDetail').textContent=`Phase 1 完成：${rows.length} 檔上市股票中，${candidates.length} 檔符合基本條件，進行深度分析`;
  }catch(e){
    // Phase 1 失敗 → 提示並停止
    showS('s3','Phase 1 失敗：'+e.message+'<br><small>TWSE JSONP 可能暫時無法使用，請稍後再試</small>','s-err');
    btn.disabled=false;document.getElementById('sSp').style.display='none';document.getElementById('sTxt').textContent='開始全市場掃描';
    document.getElementById('sProg').style.display='none';return;
  }

  if(candidates.length===0){
    showS('s3','沒有符合條件的股票，請調整篩選條件','s-err');
    btn.disabled=false;document.getElementById('sSp').style.display='none';document.getElementById('sTxt').textContent='開始全市場掃描';
    document.getElementById('sProg').style.display='none';return;
  }

  // ── Phase 2: Yahoo Finance 深度分析 ──
  // 取前 N 檔（依成交量排序，優先看大量）
  candidates.sort((a,b)=>b.vol-a.vol);
  const toAnalyze=candidates.slice(0,maxAnalyze);
  const total=toAnalyze.length;
  document.getElementById('sBar').style.width='10%';

  for(let i=0;i<total;i++){
    if(stopped)break;
    const c=toAnalyze[i];
    const sym=c.code+'.TW';
    const pct=10+Math.round(i/total*85);
    document.getElementById('sBar').style.width=pct+'%';
    document.getElementById('sProgLabel').textContent=`Phase 2 深度分析：${sym} ${c.name} (${i+1}/${total})`;
    try{
      const[dR,wR]=await Promise.all([yahooFetch(sym,'1d','6mo'),yahooFetch(sym,'1wk','2y')]);
      const{candles:dC}=parseYahoo(dR);const{candles:wC}=parseYahoo(wR);
      if(dC.length<10)continue;
      const daily=dC,weekly=wC.length>=2?wC:buildWeekly(dC);
      const dr=analyze(daily),wr=analyze(weekly);
      const score=scoreStock(dr,wr,c.vol*1000);
      const action=getAction(dr,wr);
      const last=daily[daily.length-1],prev=daily[daily.length-2];
      const item={sym:c.code,name:c.name,last,delta:last.close-prev.close,pct:(last.close-prev.close)/prev.close*100,dr,wr,score,action,vol:c.vol,twseData:c};

      if(dir==='bull'||dir==='both'){if(score.bull>=6)scanBullList.push(item);}
      if(dir==='bear'||dir==='both'){if(score.bear>=6)scanBearList.push(item);}
    }catch(e){/* skip */}
    await new Promise(r=>setTimeout(r,350));
  }

  // 排序：多方按多分高低，空方按空分高低
  scanBullList.sort((a,b)=>b.score.bull-a.score.bull);
  scanBearList.sort((a,b)=>b.score.bear-a.score.bear);

  document.getElementById('sBar').style.width='100%';
  document.getElementById('sProgLabel').textContent=`完成！多方候選 ${scanBullList.length} 檔，空方候選 ${scanBearList.length} 檔`;

  btn.disabled=false;document.getElementById('sSp').style.display='none';document.getElementById('sTxt').textContent='開始全市場掃描';
  setTimeout(()=>{document.getElementById('sProg').style.display='none';},3000);

  renderScanResults();
  document.getElementById('scanResultsWrap').style.display='block';
  showS('s3',`掃描完成：${toAnalyze.length} 檔深度分析，找到多方 ${scanBullList.length} 檔、空方 ${scanBearList.length} 檔`,'s-ok');
  setTimeout(()=>hideS('s3'),5000);
}

function renderScanResults(){
  document.getElementById('scanBullResults').innerHTML=
    scanBullList.length===0
      ?'<div class="empty">沒有符合多方條件的股票</div>'
      :scanBullList.map(r=>renderStockCard(r,false,'bull')).join('');
  document.getElementById('scanBearResults').innerHTML=
    scanBearList.length===0
      ?'<div class="empty">沒有符合空方條件的股票</div>'
      :scanBearList.map(r=>renderStockCard(r,false,'bear')).join('');
  // update dir tab labels
  document.getElementById('dirBull').textContent=`多方候選 (${scanBullList.length})`;
  document.getElementById('dirBear').textContent=`空方候選 (${scanBearList.length})`;
}

function showDir(dir){
  document.getElementById('scanBullResults').style.display=dir==='bull'?'block':'none';
  document.getElementById('scanBearResults').style.display=dir==='bear'?'block':'none';
  document.getElementById('dirBull').className='dir-tab'+(dir==='bull'?' on-bull':'');
  document.getElementById('dirBear').className='dir-tab'+(dir==='bear'?' on-bear':'');
}

// ── 股票卡片 ──
function renderStockCard(r,showAction=true,scoreDir='bull'){
  if(r.error)return`<div class="stock-card"><div class="sc-code">${r.sym}</div><div style="font-size:12px;color:var(--bear);margin-top:4px">載入失敗：${r.error}</div></div>`;
  const up=r.delta>=0;
  const scoreVal=scoreDir==='bear'?r.score?.bear:r.score?.bull;
  const scoreMax=scoreDir==='bear'?14:14;
  const scoreColor=scoreDir==='bear'?'var(--bear)':'var(--bull)';
  const scoreFillCls=scoreDir==='bear'?'sf-bear':'sf-bull';
  const volStr=r.vol?`成交量 ${r.vol.toFixed(0)}張`:'';
  const tagHTML=(r.score?.reasons||[]).slice(0,4).map(t=>`<span class="tag tag-${t.t}">${t.s}</span>`).join('');
  const actionBadge=showAction&&r.action?`<div class="action-badge ${r.action.cls}">${r.action.action}</div><div style="font-size:11px;color:var(--tx2);margin-bottom:6px">${r.action.detail}</div>`:'';
  return`<div class="stock-card" onclick="jumpTo('${r.sym}')">
    <div class="sc-top">
      <div><div class="sc-code">${r.sym.replace('.TW','')}</div><div class="sc-name">${r.name}</div></div>
      <div><div class="sc-price ${up?'cbull':'cbear'}">${r.last.close.toFixed(2)}</div><div class="sc-delta ${up?'cbull':'cbear'}">${up?'▲':'▼'} ${Math.abs(r.delta).toFixed(2)} (${up?'+':''}${r.pct.toFixed(2)}%)</div></div>
    </div>
    ${actionBadge}
    <div class="score-bar">
      <div class="score-num-big" style="color:${scoreColor}">${scoreVal||0}</div>
      <div class="score-bg-big"><div class="score-fill-big ${scoreFillCls}" style="width:${Math.min(100,((scoreVal||0)/scoreMax)*100).toFixed(0)}%"></div></div>
      <div class="score-label" style="color:${scoreColor}">${scoreDir==='bear'?'空方分數':'多方分數'} / ${scoreMax}</div>
    </div>
    <div class="tags">${tagHTML}</div>
    ${volStr?`<div class="sc-footer">${volStr} · 點擊查看完整分析 →</div>`:'<div class="sc-footer">點擊查看完整分析 →</div>'}
  </div>`;
}

function jumpTo(sym){
  document.getElementById('sym').value=sym.replace('.TW','');
  document.querySelectorAll('.tab-btn')[0].click();
  runSingle();
}
